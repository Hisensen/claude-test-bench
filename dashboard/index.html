<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🧪 Test Bench Dashboard</title>
<style>
/* ── Reset & Base ─────────────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg0:#07071a;--bg1:#0e0e28;--bg2:#14143a;--bg3:#1c1c50;
  --border:#252560;
  --purple:#7c3aed;--blue:#2563eb;--cyan:#0891b2;
  --green:#16a34a;--green-l:#22c55e;
  --red:#b91c1c;--red-l:#ef4444;
  --yellow:#b45309;--yellow-l:#f59e0b;
  --gray:#4b5563;--text:#e0e0ff;--muted:#6b7280;
  --radius:12px;
  --font: 'Segoe UI',system-ui,sans-serif;
}
body{background:var(--bg0);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden}

/* ── Layout ───────────────────────────────────────────── */
#app{display:flex;flex-direction:column;height:100vh;gap:0}
#header{flex:0 0 auto;padding:1rem 1.5rem;background:var(--bg1);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
#main{flex:1 1 0;overflow:hidden;display:flex;gap:0}
#agents-panel{flex:1 1 0;overflow-y:auto;padding:1.25rem;display:flex;flex-direction:column;gap:1rem}
#log-panel{flex:0 0 320px;border-left:1px solid var(--border);display:flex;flex-direction:column;background:var(--bg1)}

/* ── Header ───────────────────────────────────────────── */
#logo{font-size:1.4rem;font-weight:700;white-space:nowrap}
#task-label{flex:1;font-size:.85rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#task-label b{color:var(--text)}

.badge{padding:.25rem .7rem;border-radius:20px;font-size:.78rem;font-weight:600;white-space:nowrap}
.badge-gray   {background:rgba(75,85,99,.25);  color:var(--gray)}
.badge-blue   {background:rgba(37,99,235,.2);  color:#93c5fd}
.badge-green  {background:rgba(22,163,74,.2);  color:var(--green-l)}
.badge-red    {background:rgba(185,28,28,.2);  color:var(--red-l)}
.badge-yellow {background:rgba(180,83,9,.2);   color:var(--yellow-l)}
.badge-purple {background:rgba(124,58,237,.2); color:#c4b5fd}

#iter-label{font-size:.85rem;color:var(--muted);white-space:nowrap}
#iter-label b{color:var(--text)}

/* ── Agent Cards ──────────────────────────────────────── */
.agent-card{
  background:var(--bg1);border:1px solid var(--border);
  border-radius:var(--radius);padding:1.1rem 1.25rem;
  display:grid;grid-template-columns:auto 1fr auto;gap:.5rem .9rem;
  align-items:start;transition:border-color .3s,box-shadow .3s;
}
.agent-card.running {border-color:var(--blue);  box-shadow:0 0 18px rgba(37,99,235,.15)}
.agent-card.passed  {border-color:var(--green); box-shadow:0 0 18px rgba(22,163,74,.12)}
.agent-card.failed  {border-color:var(--red);   box-shadow:0 0 18px rgba(185,28,28,.12)}
.agent-card.fixing  {border-color:var(--yellow);box-shadow:0 0 18px rgba(180,83,9,.12)}

.agent-icon{font-size:2rem;line-height:1;grid-row:span 2;padding-top:.1rem}
.agent-header{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
.agent-role{font-weight:600;font-size:1rem}
.agent-action{
  grid-column:2;font-size:.82rem;color:var(--muted);
  border-left:2px solid var(--border);padding-left:.6rem;
  min-height:1.2rem;
}
.agent-action.pulse{color:#93c5fd;animation:pulse 1.4s ease-in-out infinite}

/* Status dot */
.dot{width:9px;height:9px;border-radius:50%;flex:0 0 9px}
.dot-gray   {background:var(--gray)}
.dot-blue   {background:#3b82f6;animation:blink 1s step-end infinite}
.dot-green  {background:var(--green-l)}
.dot-red    {background:var(--red-l)}
.dot-yellow {background:var(--yellow-l);animation:blink 1s step-end infinite}

/* Issues list inside card */
.agent-issues{
  grid-column:1/-1;margin-top:.5rem;
  display:flex;flex-direction:column;gap:.35rem;
}
.issue-row{
  display:flex;gap:.5rem;align-items:flex-start;
  background:var(--bg0);border-radius:6px;padding:.45rem .65rem;font-size:.8rem;
}
.sev-badge{
  padding:.1rem .4rem;border-radius:4px;font-size:.72rem;font-weight:600;flex:0 0 auto;
}
.sev-high  {background:rgba(185,28,28,.3);  color:#fca5a5}
.sev-med   {background:rgba(180,83,9,.3);   color:#fcd34d}
.sev-low   {background:rgba(37,99,235,.2);  color:#93c5fd}

.issue-desc{flex:1;color:#cbd5e1;line-height:1.4}
.fix-hint{color:var(--muted);font-size:.78rem;margin-top:.15rem}

/* Summary bar */
.summary-bar{
  grid-column:1/-1;margin-top:.4rem;
  padding:.4rem .7rem;border-radius:6px;font-size:.8rem;
  color:#cbd5e1;background:var(--bg0);line-height:1.45;
}

/* ── Event Log ────────────────────────────────────────── */
#log-header{padding:.75rem 1rem;font-size:.78rem;font-weight:600;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;border-bottom:1px solid var(--border)}
#log-body{flex:1;overflow-y:auto;padding:.5rem .75rem;display:flex;flex-direction:column;gap:.3rem}
.log-row{display:flex;gap:.5rem;font-size:.78rem;line-height:1.45}
.log-time{color:var(--muted);flex:0 0 auto;padding-top:.05rem}
.log-msg{flex:1}
.log-msg.info   {color:#94a3b8}
.log-msg.success{color:var(--green-l)}
.log-msg.error  {color:var(--red-l)}
.log-msg.warn   {color:var(--yellow-l)}
.log-msg.fix    {color:#c4b5fd}

/* ── Progress bar ─────────────────────────────────────── */
#progress-bar{
  height:3px;background:var(--bg3);flex:0 0 auto;
  position:relative;overflow:hidden;
}
#progress-fill{height:100%;transition:width .6s ease;background:linear-gradient(90deg,var(--purple),var(--blue),var(--cyan))}
#progress-bar.active::after{
  content:'';position:absolute;top:0;left:-60%;width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);
  animation:shimmer 1.6s linear infinite;
}

/* ── Empty / Done overlay ─────────────────────────────── */
#overlay{
  position:fixed;inset:0;background:rgba(7,7,26,.92);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:1rem;z-index:50;backdrop-filter:blur(6px);
}
#overlay.hidden{display:none}
#overlay-icon{font-size:5rem;line-height:1}
#overlay-title{font-size:1.8rem;font-weight:700}
#overlay-sub{font-size:1rem;color:var(--muted)}
#overlay-btn{
  margin-top:.5rem;padding:.55rem 1.4rem;
  background:linear-gradient(90deg,var(--purple),var(--blue));
  border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:.95rem;
}
#overlay-btn:hover{opacity:.88}

/* ── Spinner for initializing ─────────────────────────── */
#spinner{
  position:fixed;inset:0;background:var(--bg0);
  display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem;z-index:60;
}
#spinner.hidden{display:none}
.spin-ring{
  width:52px;height:52px;border-radius:50%;
  border:4px solid var(--bg3);border-top-color:var(--purple);
  animation:spin .9s linear infinite;
}
#spinner p{color:var(--muted);font-size:.95rem}

/* ── Animations ───────────────────────────────────────── */
@keyframes blink  {0%,100%{opacity:1}50%{opacity:.25}}
@keyframes pulse  {0%,100%{opacity:1}50%{opacity:.5}}
@keyframes shimmer{to{left:120%}}
@keyframes spin   {to{transform:rotate(360deg)}}
@keyframes fadeIn {from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.fade-in{animation:fadeIn .3s ease both}
</style>
</head>
<body>

<!-- 初始化 spinner -->
<div id="spinner">
  <div class="spin-ring"></div>
  <p id="spinner-msg">正在连接 Test Bench…</p>
</div>

<!-- 完成/超时覆层 -->
<div id="overlay" class="hidden">
  <div id="overlay-icon"></div>
  <div id="overlay-title"></div>
  <div id="overlay-sub"></div>
  <button id="overlay-btn" onclick="document.getElementById('overlay').classList.add('hidden')">查看详情</button>
</div>

<div id="app">
  <!-- 进度条 -->
  <div id="progress-bar"><div id="progress-fill" style="width:0%"></div></div>

  <!-- Header -->
  <div id="header">
    <span id="logo">🧪 Test Bench</span>
    <span id="task-label"><b id="task-text">加载中…</b></span>
    <span id="status-badge" class="badge badge-gray">初始化</span>
    <span id="iter-label" class="badge-gray badge"></span>
  </div>

  <!-- Main area -->
  <div id="main">
    <!-- Agent cards -->
    <div id="agents-panel"></div>

    <!-- Event log -->
    <div id="log-panel">
      <div id="log-header">事件日志</div>
      <div id="log-body"></div>
    </div>
  </div>
</div>

<script>
// ── Constants ──────────────────────────────────────────────────────────
const API = 'http://localhost:7788/status';
const POLL_MS = 700;

// ── State ──────────────────────────────────────────────────────────────
let lastEventCount = 0;
let prevStatus = null;
let initialized = false;

// ── Status → display mappings ──────────────────────────────────────────
const STATUS_LABEL = {
  initializing: '初始化',
  generating:   '生成项目',
  briefing:     '生成简报',
  testing:      '测试中',
  fixing:       '修复中',
  completed:    '全部通过 ✅',
  timeout:      '超时结束',
};

const STATUS_BADGE = {
  initializing: 'badge-gray',
  generating:   'badge-purple',
  briefing:     'badge-blue',
  testing:      'badge-blue',
  fixing:       'badge-yellow',
  completed:    'badge-green',
  timeout:      'badge-red',
};

const AGENT_STATUS_DOT = {
  waiting: 'dot-gray',
  running: 'dot-blue',
  passed:  'dot-green',
  failed:  'dot-red',
};

const AGENT_STATUS_BADGE = {
  waiting: ['badge-gray',   '等待'],
  running: ['badge-blue',   '运行中'],
  passed:  ['badge-green',  '通过'],
  failed:  ['badge-red',    '未通过'],
};

const SEV_CLASS = { high:'sev-high', medium:'sev-med', low:'sev-low' };
const SEV_LABEL = { high:'高', medium:'中', low:'低' };

// ── DOM helpers ────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
function esc(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])) }

// ── Render agent card ──────────────────────────────────────────────────
function renderCard(agent) {
  const st    = agent.status || 'waiting';
  const [badgeCls, badgeLabel] = AGENT_STATUS_BADGE[st] || ['badge-gray','?'];
  const dotCls = AGENT_STATUS_DOT[st] || 'dot-gray';
  const running = st === 'running';

  // Issues
  let issuesHtml = '';
  if (agent.issues && agent.issues.length) {
    issuesHtml = `<div class="agent-issues">` +
      agent.issues.slice(0,6).map(iss => {
        const sevCls = SEV_CLASS[iss.severity] || 'sev-low';
        const sevLbl = SEV_LABEL[iss.severity] || iss.severity || '?';
        return `<div class="issue-row">
          <span class="sev-badge ${sevCls}">${sevLbl}</span>
          <div>
            <div class="issue-desc">${esc(iss.description || '')}</div>
            ${iss.fix_hint ? `<div class="fix-hint">💡 ${esc(iss.fix_hint)}</div>` : ''}
          </div>
        </div>`;
      }).join('') +
    `</div>`;
  }

  // Summary
  const summaryHtml = agent.summary
    ? `<div class="summary-bar">📋 ${esc(agent.summary)}</div>` : '';

  return `
    <div class="agent-card fade-in ${st}" id="card-${agent.id}">
      <div class="agent-icon">${esc(agent.icon || '🤖')}</div>
      <div class="agent-header">
        <span class="agent-role">${esc(agent.role)}</span>
        <span class="dot ${dotCls}"></span>
        <span class="badge ${badgeCls}" style="font-size:.73rem;padding:.15rem .55rem">${badgeLabel}</span>
        ${agent.issues_count ? `<span class="badge badge-red" style="font-size:.73rem;padding:.15rem .55rem">⚠ ${agent.issues_count} 个问题</span>` : ''}
      </div>
      <div style="display:flex;align-items:center;justify-content:flex-end">
        <span style="font-size:.75rem;color:var(--muted)">#${agent.id}</span>
      </div>
      <div class="agent-action ${running?'pulse':''}">
        ${running ? '⟳ ' : ''}${esc(agent.action || '…')}
      </div>
      ${issuesHtml}
      ${summaryHtml}
    </div>`;
}

// ── Render event log entry ─────────────────────────────────────────────
function renderEvent(ev) {
  const logBody = $('log-body');
  const row = document.createElement('div');
  row.className = 'log-row fade-in';
  row.innerHTML = `<span class="log-time">${esc(ev.t)}</span><span class="log-msg ${ev.k||'info'}">${esc(ev.m)}</span>`;
  logBody.appendChild(row);
  logBody.scrollTop = logBody.scrollHeight;
}

// ── Progress bar ───────────────────────────────────────────────────────
function setProgress(iter, max, status) {
  const pct = max > 0 ? Math.round((iter / max) * 100) : 0;
  $('progress-fill').style.width = pct + '%';
  const bar = $('progress-bar');
  bar.classList.toggle('active', ['testing','fixing','generating','briefing'].includes(status));
}

// ── Overlay ────────────────────────────────────────────────────────────
function showOverlay(status) {
  if (status === 'completed') {
    $('overlay-icon').textContent  = '🎉';
    $('overlay-title').textContent = '所有测试通过！';
    $('overlay-sub').textContent   = '项目已完成多轮测试，点击关闭查看详情';
  } else if (status === 'timeout') {
    $('overlay-icon').textContent  = '⏱';
    $('overlay-title').textContent = '达到最大迭代次数';
    $('overlay-sub').textContent   = '部分测试仍未通过，请查看详情';
  }
  $('overlay').classList.remove('hidden');
}

// ── Main render ────────────────────────────────────────────────────────
function render(data) {
  // Hide spinner
  if (!initialized) {
    $('spinner').classList.add('hidden');
    initialized = true;
  }

  // Task label
  $('task-text').textContent = data.task || '—';

  // Status badge
  const badge = $('status-badge');
  badge.textContent = STATUS_LABEL[data.status] || data.status || '—';
  badge.className   = 'badge ' + (STATUS_BADGE[data.status] || 'badge-gray');

  // Iteration label
  if (data.max_iterations > 0) {
    $('iter-label').textContent = `第 ${data.iteration || 0} / ${data.max_iterations} 轮`;
  }

  // Progress bar
  setProgress(data.iteration || 0, data.max_iterations || 1, data.status);

  // Agent cards
  const panel = $('agents-panel');
  const agents = data.agents || [];
  agents.forEach(agent => {
    const existing = $(`card-${agent.id}`);
    const html = renderCard(agent);
    if (!existing) {
      const tmp = document.createElement('div');
      tmp.innerHTML = html;
      panel.appendChild(tmp.firstElementChild);
    } else {
      const tmp = document.createElement('div');
      tmp.innerHTML = html;
      const newEl = tmp.firstElementChild;
      // Only update if something changed to avoid flicker
      if (existing.outerHTML !== newEl.outerHTML) {
        existing.replaceWith(newEl);
      }
    }
  });

  // New events
  const events = data.events || [];
  if (events.length > lastEventCount) {
    events.slice(lastEventCount).forEach(renderEvent);
    lastEventCount = events.length;
  }

  // Overlay
  if (['completed','timeout'].includes(data.status) && prevStatus !== data.status) {
    setTimeout(() => showOverlay(data.status), 500);
  }
  prevStatus = data.status;
}

// ── Polling ────────────────────────────────────────────────────────────
let failCount = 0;

async function poll() {
  try {
    const res  = await fetch(API, { cache: 'no-store' });
    const data = await res.json();
    render(data);
    failCount = 0;
  } catch (e) {
    failCount++;
    if (failCount === 1) {
      $('spinner-msg').textContent = '等待 Test Bench 启动…';
      $('spinner').classList.remove('hidden');
      initialized = false;
    }
  }
  setTimeout(poll, POLL_MS);
}

// ── Boot ───────────────────────────────────────────────────────────────
poll();
</script>
</body>
</html>
